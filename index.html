<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="responsive.css">
        <link rel="stylesheet" href="fonts.css">
        <script src="script.js"></script>
        <script src="script_data.js"></script>
        <script src="script_render.js"></script>

        <!-- Bootstrap files / Base Stats-->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
            crossorigin="anonymous"
        />
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
            crossorigin="anonymous"
        ></script>

        <title>Pokedex</title>
        <link rel="icon" type="image/x-icon" href="./img/pokeball.png" />
    </head>
    <body onload="init()">
        <header>
            <img src="./img/pokeball(2).png" alt="">
            <h1>Pokedex</h1>
            <img id="animateImage" class="cursor" onclick="playMusic(), animateImage()" src="./img/lautsprecher(2).png" alt="">
        </header>

        <div class="wrapper" id="wrapper"></div>


        <div id="cardsArea"></div>
        <div id="loadMoreBtn">
            <button onclick="loadMore()">load more</button>
            <img onclick="scrollToTop()" class="goUp" src="./img/pfeil-nach-oben.png" alt="">
        </div>

        <div onclick="goBack()" id="overlay" class="dNone"></div>

        <div id="pokedexInfoArea" class="pokedexInfoArea dNone">
            
            <div id="pokedex">
                <div class="pokedexHeadImg">
                    <img onclick="goBack()" src="./img/pfeil(white).png" alt="">
                    <div id="likeHeart">
                        <!-- <img onclick="likeBtn()" id="likeBtn" src="./img/herz(3).png" alt=""> -->
                    </div>
                </div>
                <h3 id="pokemonName"></h3>
                <div id="pokedexInfoAbilities"></div>
                <div id="pokemonNumber"></div>
            </div>

            <div id="goNextImg"></div>

            <div class="info-container">
                <div class="parent-container">
                    <img id="pokemonImg"/>
                </div>
                <div id="pokemonBackgroundImg">
                    <img src="">
                </div>

                <nav>
                    <ul>
                        <li onclick="showAbout()">About</li>
                        <li onclick="showBaseStats()">Base Stats</li>
                        <li onclick="showMoves()">Moves</li>
                    </ul>
                </nav>

                <div class="line"></div>


                <div id="about"></div>
                <div id="abilities"></div>
                <div id="moves"></div>
            </div>
        </div>
    </body>
</html>
